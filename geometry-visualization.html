<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoMCP Visualization</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f5f5;
      color: #222;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      line-height: 1.6;
    }

    .frame {
      margin-top: 20px;
      background: #fff;
      border: 1px solid #d4d4d4;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    object {
      display: block;
      width: 100%;
      min-height: 620px;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Geometry Visualization</h1>
    <p>SVG bên dưới được sinh trực tiếp từ engine hiện tại của dự án.</p>
    <div class="frame">
      <object data="./geometry-engine.svg" type="image/svg+xml">Trình duyệt không tải được SVG.</object>
    </div>
  </main>
</body>
</html>
